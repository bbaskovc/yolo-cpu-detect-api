name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  validate:
    name: Repository validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run baseline validator
        run: python scripts/verify_initial_repository.py

      - name: Run tests
        run: python -m pytest

      - name: Run linter
        run: ruff check .

      - name: Run formatter check
        run: ruff format --check .

      - name: Run type checks
        run: mypy src

      - name: Run compileall
        run: python -m compileall -q src

      - name: Verify diff cleanliness
        run: git diff --check
